# ---- Database: H2 file-based (zero install) ----
# Data persists in ./data/kandanda.mv.db between runs. To swap to PostgreSQL later,
# only these few lines change (url, driver, username/password) — no code changes,
# because Spring Data JPA abstracts the SQL dialect. That is why we chose JPA.
spring.datasource.url=jdbc:h2:file:./data/kandanda;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Create/update tables automatically from the @Entity classes.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Quieter logs; flip to true if you want to see the generated SQL while learning.
spring.jpa.show-sql=false

# H2 web console at http://localhost:8080/h2-console (handy to eyeball the data).
spring.h2.console.enabled=true
